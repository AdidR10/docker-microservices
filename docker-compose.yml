version: '3.8'

services:
  # User Service
  user-service:
    build: ./user-service
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/user_db
      - SECRET_KEY=your-secret-key-change-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
    depends_on:
      - postgres

  # Product Service
  product-service:
    build: ./product-service
    ports:
      - "8001:8001"
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - MONGODB_DB=product_db
      - INVENTORY_SERVICE_URL=http://inventory-service:8002
    depends_on:
      - mongo
      - inventory-service

  # Inventory Service
  inventory-service:
    build: ./inventory-service
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/inventory_db
    depends_on:
      - postgres

  # Order Service
  order-service:
    build: ./order-service
    ports:
      - "8003:8003"
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - MONGODB_DB=order_db
      - USER_SERVICE_URL=http://user-service:8000
      - PRODUCT_SERVICE_URL=http://product-service:8001
      - INVENTORY_SERVICE_URL=http://inventory-service:8002
    depends_on:
      - mongo
      - user-service
      - product-service
      - inventory-service

  # PostgreSQL (shared by user and inventory services)
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_MULTIPLE_DATABASES=user_db,inventory_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # MongoDB (for product service)
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
